<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile: prevents zooming and scales correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shop Restock</title>
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SCREEN 1: Location Selection -->
<!-- This is the first thing the user sees -->
<div id="screen-location" class="screen active">
    <div class="location-container">
        <h1>Select Location</h1>
        <button class="btn-location" data-location="aarschot">Aarschot</button>
        <button class="btn-location" data-location="mechelen">Mechelen</button>
        <div style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #ddd;">
            <h4 style="text-align: center; color: #555;">⚙️ App Data</h4>

            <button id="btn-export-data" style="margin-bottom: 10px; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; width: 100%; font-size: 16px;">
                📤 Export Layout to File
            </button>

            <label for="btn-import-data" style="display: block; background-color: #ffc107; color: black; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">
                📥 Import Layout File
            </label>
            <input type="file" id="btn-import-data" accept=".json" style="display: none;">
        </div>
    </div>
</div>

<!-- SCREEN 2: Main App Shell -->
<!-- Hidden until a location is clicked -->
<div id="screen-app" class="screen hidden">

    <button id="btn-switch-location" style="margin-bottom: 15px; padding: 10px; background-color: #6c757d; color: white; border: none; border-radius: 5px; width: 100%; font-size: 16px;">
        🔙 Switch Location
    </button>

    <!-- Top Bar -->
    <header>
        <button id="btn-back" class="hidden">← Back</button>
        <h2 id="header-title">Fridges</h2>
    </header>

    <!-- Scrollable Content Area -->
    <main id="app-content">

        <!-- VIEW A: Fridges Overview -->
        <section id="view-fridges" class="view active">
            <div class="header-actions">
                <h3>All Fridges</h3>
                <button id="btn-add-fridge" class="btn-small">+ Add</button>
            </div>
            <ul id="fridge-list" class="item-list">
                <!-- JavaScript will inject fridges here -->
            </ul>
        </section>

        <!-- VIEW B: Inside a Specific Fridge (Hidden initially) -->
        <section id="view-fridge-detail" class="view hidden">
            <h2 id="current-fridge-name" style="text-align: center; margin-bottom: 15px;"></h2>

            <input type="text" id="search-item-input" placeholder="🔍 Search items in this fridge..." style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">

            <button id="btn-add-item" style="margin-bottom: 15px; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; width: 100%; font-size: 16px;">
                ➕ Add Item
            </button>

            <ul id="item-list" class="item-list"></ul>

            <div id="modal-add-item" class="hidden" style="position: fixed; top: 10%; left: 5%; width: 90%; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 100;">
                <h3 style="margin-top: 0;">Add / Create Item</h3>

                <label style="font-size: 14px; font-weight: bold;">Name (Type to search existing):</label>
                <input type="text" id="modal-item-name" list="global-item-list" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;" placeholder="e.g., Lipton Ice Tea">
                <datalist id="global-item-list"></datalist>

                <label style="font-size: 14px; font-weight: bold;">Price (€):</label>
                <input type="number" id="modal-item-price" step="0.01" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;" placeholder="2.50">

                <label style="font-size: 14px; font-weight: bold;">VAT Level:</label>
                <select id="modal-item-vat" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px;">
                    <option value="6">6% (Food / Non-Alc)</option>
                    <option value="21">21% (Alcohol / Misc)</option>
                    <option value="0">0% (Exceptions)</option>
                </select>

                <button id="btn-save-modal-item" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; margin-bottom: 10px; font-size: 16px;">Save Item</button>
                <button id="btn-close-modal" style="width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; font-size: 16px;">Cancel</button>
            </div>
        </section>

        <!-- VIEW C: Current Master List (Hidden initially) -->
        <section id="view-current-list" class="view hidden">
            <h3>To Buy - <span id="list-location-label"></span></h3>
            <p class="text-muted" id="list-date"></p>
            <ul id="master-list" class="item-list">
                <!-- JavaScript will inject the selected items here -->
            </ul>
            <button id="btn-finish-list" class="btn-location" style="margin-top: 20px; width: 100%;">Finish & Save to History</button>
        </section>

        <!-- VIEW D: History (Hidden initially) -->
        <section id="view-history" class="view hidden">
            <h3>Previous Lists</h3>
            <ul id="history-list" class="item-list">
                <!-- JavaScript will inject old lists here -->
            </ul>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-target="view-fridges">Fridges</button>
        <button class="nav-btn" data-target="view-current-list">Current List</button>
        <button class="nav-btn" data-target="view-history">History</button>
    </nav>
</div>

<!-- We will link the JavaScript file later once we write it -->
<script src="app.js"></script>
</body>
</html>
